name: Build and deploy

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - development

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (secure)
        env:
          DOCKER_BUILDKIT: "1"
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_DELIVERY_TOKEN: ${{ secrets.CONTENTFUL_DELIVERY_TOKEN }}
          CONTENTFUL_PREVIEW_TOKEN: ${{ secrets.CONTENTFUL_PREVIEW_TOKEN }}
          CONTENTFUL_ENVIRONMENT: ${{ secrets.CONTENTFUL_ENVIRONMENT }}
        run: |
          docker build \
            --secret id=contentful_space_id,env=CONTENTFUL_SPACE_ID \
            --secret id=contentful_delivery_token,env=CONTENTFUL_DELIVERY_TOKEN \
            --secret id=contentful_preview_token,env=CONTENTFUL_PREVIEW_TOKEN \
            --secret id=contentful_environment,env=CONTENTFUL_ENVIRONMENT \
            -t $IMAGE .

      - name: Push image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development'
        run: docker push $IMAGE